<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: system-ui, sans-serif;
  cursor: none;
}
canvas { display: block; }
#ui {
  position: absolute; top: 20px; left: 50%;
  transform: translateX(-50%);
  color: #fff; font-size: 1.1rem;
  text-shadow: 0 0 10px rgba(0,150,255,0.5);
  display: flex; gap: 40px;
  pointer-events: none; z-index: 10;
  font-family: 'Courier New', monospace;
}
#ui span { background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(0,150,255,0.2); }
#gameOver {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: #fff; font-size: 2.5rem; text-align: center;
  display: none; z-index: 10;
  text-shadow: 0 0 30px rgba(255,0,0,0.5);
}
#gameOver div:first-child { font-family: 'Courier New', monospace; letter-spacing: 4px; }
#gameOver button {
  margin-top: 24px; padding: 12px 40px; font-size: 1rem;
  background: #e94560; color: #fff; border: none;
  border-radius: 8px; cursor: pointer; pointer-events: all;
  font-family: 'Courier New', monospace; letter-spacing: 2px;
  transition: 0.2s;
}
#gameOver button:hover { background: #d63851; transform: scale(1.05); }
</style>
</head>
<body>
<div id="ui">
  <span>SCORE: <span id="score">0</span></span>
  <span>HP: <span id="health">100</span></span>
  <span>WAVE: <span id="wave">1</span></span>
</div>
<div id="gameOver">
  <div>SYSTEM OFFLINE</div>
  <div style="font-size:1.2rem;margin-top:10px;text-shadow:0 0 20px rgba(255,200,0,0.3)">SCORE: <span id="finalScore">0</span></div>
  <button id="restart">RESTART</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Game State ---
const player = { x: W/2, y: H/2, radius: 18, hp: 100, maxHp: 100, invuln: 0 };
let score = 0, wave = 1, gameOver = false;
let mouseX = W/2, mouseY = H/2;
let frame = 0;

// --- Stars ---
const stars = Array.from({ length: 120 }, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: Math.random() * 1.5 + 0.5, s: Math.random() * 0.5 + 0.1
}));

// --- Particles ---
let particles = [];
function spawnParticles(x, y, count, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed + speed * 0.3;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: Math.random() * life + life * 0.3, maxLife: life * 1.3,
      color, r: Math.random() * 3 + 1.5
    });
  }
}

// --- Bullets (player) ---
let bullets = [];

// --- Enemy Bullets ---
let enemyBullets = [];

// --- Enemies ---
let enemies = [];

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -40; }
  else if (side === 1) { x = W + 40; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 40; }
  else { x = -40; y = Math.random() * H; }
  
  const hp = 1 + Math.floor(wave / 3);
  const size = 14 + Math.random() * 8;
  enemies.push({
    x, y, radius: size, hp, maxHp: hp,
    speed: 0.8 + Math.random() * 0.8 + wave * 0.05,
    shootTimer: Math.random() * 60 + 60 - Math.min(wave * 3, 40),
    color: `hsl(${Math.random() * 30 + 10}, 100%, ${50 + Math.random() * 20}%)`,
    angle: 0
  });
}

// --- Trail ---
let trails = [];

function spawnTrail(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    trails.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y + (Math.random() - 0.5) * 6,
      vx: (Math.random() - 0.5) * 0.5,
      vy: Math.random() * 1.5 + 0.5,
      life: Math.random() * 20 + 15,
      maxLife: 35, r: Math.random() * 2 + 1,
      color
    });
  }
}

// --- Screen Shake ---
let shake = 0;

// --- Fire player bullet ---
function fireBullet() {
  const dx = mouseX - player.x;
  const dy = mouseY - player.y;
  const dist = Math.hypot(dx, dy) || 1;
  const nx = dx / dist, ny = dy / dist;
  const spread = 0.08;
  
  // Fire two bullets (dual guns)
  const perpX = -ny, perpY = nx;
  const offset = 10;
  
  bullets.push({
    x: player.x + nx * 22 + perpX * offset,
    y: player.y + ny * 22 + perpY * offset,
    vx: nx * 10, vy: ny * 10, life: 80
  });
  bullets.push({
    x: player.x + nx * 22 - perpX * offset,
    y: player.y + ny * 22 - perpY * offset,
    vx: nx * 10, vy: ny * 10, life: 80
  });
}

// --- Draw player ship ---
function drawPlayer() {
  const dx = mouseX - player.x;
  const dy = mouseY - player.y;
  const angle = Math.atan2(dy, dx);
  
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(angle);
  
  const pulse = Math.sin(frame * 0.1) * 0.03 + 1;
  ctx.scale(pulse, pulse);
  
  // Glow
  const grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
  grad.addColorStop(0, 'rgba(0, 180, 255, 0.15)');
  grad.addColorStop(1, 'rgba(0, 180, 255, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, 40, 0, Math.PI * 2);
  ctx.fill();
  
  // Engine glow
  const eg = ctx.createRadialGradient(-20, 0, 2, -20, 0, 15);
  eg.addColorStop(0, 'rgba(0, 200, 255, 0.6)');
  eg.addColorStop(1, 'rgba(0, 200, 255, 0)');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.arc(-20, 0, 15, 0, Math.PI * 2);
  ctx.fill();
  
  // Engine flames
  const flameLen = 12 + Math.sin(frame * 0.3) * 4;
  const fg = ctx.createLinearGradient(-18, 0, -18 - flameLen, 0);
  fg.addColorStop(0, 'rgba(100, 220, 255, 0.9)');
  fg.addColorStop(0.5, 'rgba(0, 180, 255, 0.5)');
  fg.addColorStop(1, 'rgba(0, 100, 255, 0)');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.moveTo(-18, -5);
  ctx.lineTo(-18 - flameLen, 0);
  ctx.lineTo(-18, 5);
  ctx.closePath();
  ctx.fill();
  
  // Ship body
  ctx.shadowColor = 'rgba(0, 180, 255, 0.4)';
  ctx.shadowBlur = 15;
  
  // Main body - sleek fighter shape
  ctx.beginPath();
  ctx.moveTo(24, 0);
  ctx.lineTo(12, -6);
  ctx.lineTo(-10, -8);
  ctx.lineTo(-18, -4);
  ctx.lineTo(-18, 4);
  ctx.lineTo(-10, 8);
  ctx.lineTo(12, 6);
  ctx.closePath();
  
  const bodyGrad = ctx.createLinearGradient(-10, -8, 10, 8);
  bodyGrad.addColorStop(0, '#1a2a4a');
  bodyGrad.addColorStop(0.5, '#2a4a7a');
  bodyGrad.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 180, 255, 0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  ctx.shadowBlur = 0;
  
  // Wing accents
  ctx.beginPath();
  ctx.moveTo(8, 6);
  ctx.lineTo(0, 12);
  ctx.lineTo(-4, 8);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0, 180, 255, 0.3)';
  ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(8, -6);
  ctx.lineTo(0, -12);
  ctx.lineTo(-4, -8);
  ctx.closePath();
  ctx.fill();
  
  // Gun barrels
  ctx.shadowColor = 'rgba(255, 100, 50, 0.3)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#3a5a8a';
  ctx.fillRect(20, -9, 6, 3);
  ctx.fillRect(20, 6, 6, 3);
  
  // Cockpit
  ctx.shadowBlur = 0;
  const cg = ctx.createRadialGradient(10, 0, 1, 10, 0, 5);
  cg.addColorStop(0, 'rgba(100, 220, 255, 0.8)');
  cg.addColorStop(1, 'rgba(0, 100, 200, 0.2)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.ellipse(10, 0, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

// --- Draw enemy ---
function drawEnemy(e) {
  const angle = Math.atan2(player.y - e.y, player.x - e.x);
  e.angle = angle;
  
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.rotate(angle);
  
  // Glow
  const grad = ctx.createRadialGradient(0, 0, 3, 0, 0, 25);
  grad.addColorStop(0, 'rgba(255, 50, 0, 0.1)');
  grad.addColorStop(1, 'rgba(255, 50, 0, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, 25, 0, Math.PI * 2);
  ctx.fill();
  
  // Body
  ctx.shadowColor = 'rgba(255, 50, 0, 0.4)';
  ctx.shadowBlur = 10;
  
  const pulse = Math.sin(frame * 0.15 + e.x) * 0.02 + 1;
  ctx.scale(pulse, pulse);
  
  ctx.beginPath();
  ctx.moveTo(-16, 0);
  ctx.lineTo(-6, -10);
  ctx.lineTo(12, -7);
  ctx.lineTo(16, 0);
  ctx.lineTo(12, 7);
  ctx.lineTo(-6, 10);
  ctx.closePath();
  
  ctx.fillStyle = e.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255, 100, 50, 0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  ctx.shadowBlur = 0;
  
  // Eye / core
  const coreGrad = ctx.createRadialGradient(6, 0, 1, 6, 0, 5);
  coreGrad.addColorStop(0, 'rgba(255, 200, 100, 0.9)');
  coreGrad.addColorStop(1, 'rgba(255, 50, 0, 0.1)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(6, 0, 5, 0, Math.PI * 2);
  ctx.fill();
  
  // HP bar
  if (e.hp < e.maxHp) {
    ctx.fillStyle = 'rgba(255,0,0,0.5)';
    ctx.fillRect(-12, -14, 24 * (e.hp / e.maxHp), 3);
    ctx.strokeStyle = 'rgba(255,0,0,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-12, -14, 24, 3);
  }
  
  ctx.restore();
}

// --- Update ---
function update() {
  frame++;
  if (gameOver) return;
  
  // Player invulnerability timer
  if (player.invuln > 0) player.invuln--;
  
  // Move player toward mouse
  const dx = mouseX - player.x;
  const dy = mouseY - player.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 2) {
    const speed = Math.min(6, dist * 0.08);
    player.x += (dx / dist) * speed;
    player.y += (dy / dist) * speed;
  }
  
  // Clamp player
  player.x = Math.max(30, Math.min(W - 30, player.x));
  player.y = Math.max(30, Math.min(H - 30, player.y));
  
  // Auto fire
  if (frame % 4 === 0) fireBullet();
  
  // Engine trail
  const a = Math.atan2(mouseY - player.y, mouseX - player.x);
  spawnTrail(
    player.x - Math.cos(a) * 20,
    player.y - Math.sin(a) * 20,
    'rgba(0,180,255,0.6)', 1
  );
  
  // Spawn enemies
  const maxEnemies = 3 + wave;
  if (enemies.length < maxEnemies && frame % (Math.max(30, 80 - wave * 3)) === 0) {
    spawnEnemy();
  }
  
  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    
    // Trail
    if (frame % 2 === 0) {
      trails.push({
        x: b.x + (Math.random() - 0.5) * 4,
        y: b.y + (Math.random() - 0.5) * 4,
        vx: 0, vy: 0, life: 10, maxLife: 10, r: 2,
        color: 'rgba(255,50,0,0.8)'
      });
    }
    
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      enemyBullets.splice(i, 1);
      continue;
    }
    
    // Hit player
    if (player.invuln <= 0 && Math.hypot(b.x - player.x, b.y - player.y) < player.radius + 4) {
      player.hp -= 8;
      shake = 8;
      player.invuln = 20;
      spawnParticles(player.x, player.y, 20, '#ff4400', 4, 30);
      spawnParticles(player.x, player.y, 10, '#ffaa00', 3, 20);
      enemyBullets.splice(i, 1);
      if (player.hp <= 0) {
        player.hp = 0;
        endGame();
      }
    }
  }
  
  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    
    // Trail
    if (frame % 2 === 0) {
      trails.push({
        x: b.x + (Math.random() - 0.5) * 3,
        y: b.y + (Math.random() - 0.5) * 3,
        vx: 0, vy: 0, life: 8, maxLife: 8, r: 1.5,
        color: 'rgba(0,200,255,0.9)'
      });
    }
    
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1);
      continue;
    }
    
    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + 4) {
        e.hp--;
        spawnParticles(b.x, b.y, 6, '#ff8800', 2, 15);
        bullets.splice(i, 1);
        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, 30, '#ff4400', 5, 35);
          spawnParticles(e.x, e.y, 20, '#ffaa00', 4, 25);
          spawnParticles(e.x, e.y, 10, '#ffffff', 3, 15);
          score += 10 * (1 + Math.floor(wave / 2));
          enemies.splice(j, 1);
          shake = 4;
        }
        break;
      }
    }
  }
  
  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d > 50) {
      e.x += (dx / d) * e.speed;
      e.y += (dy / d) * e.speed;
    }
    
    // Enemy engine trail
    if (frame % 3 === 0) {
      spawnTrail(e.x, e.y, 'rgba(255,100,0,0.4)', 1);
    }
    
    // Shoot at player
    e.shootTimer--;
    if (e.shootTimer <= 0 && d < 600) {
      e.shootTimer = Math.max(20, 80 - wave * 3) + Math.random() * 30;
      const angle = Math.atan2(dy, dx);
      const spd = 2.5 + wave * 0.1;
      enemyBullets.push({
        x: e.x + Math.cos(angle) * 18,
        y: e.y + Math.sin(angle) * 18,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 120
      });
    }
    
    // Off screen - remove if too far
    if (e.x < -100 || e.x > W + 100 || e.y < -100 || e.y > H + 100) {
      enemies.splice(i, 1);
    }
  }
  
  // Wave progression
  if (frame % 600 === 0 && frame > 0) {
    wave++;
  }
  
  // Update trails
  for (let i = trails.length - 1; i >= 0; i--) {
    const t = trails[i];
    t.x += t.vx;
    t.y += t.vy;
    t.life--;
    if (t.life <= 0) { trails.splice(i, 1); }
  }
  
  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); }
  }
  
  // Shake decay
  if (shake > 0) shake *= 0.85;
  if (shake < 0.1) shake = 0;
}

// --- Draw ---
function draw() {
  ctx.save();
  
  // Screen shake
  if (shake > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * shake * 1.5,
      (Math.random() - 0.5) * shake * 1.5
    );
  }
  
  // Background
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, W * 0.7);
  bgGrad.addColorStop(0, '#0d0d2b');
  bgGrad.addColorStop(1, '#050510');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-50, -50, W + 100, H + 100);
  
  // Stars
  for (const s of stars) {
    const twinkle = Math.sin(frame * 0.02 + s.x * s.y) * 0.3 + 0.7;
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Trails
  for (const t of trails) {
    const alpha = t.life / t.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = t.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (0.5 + alpha * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Enemy bullets
  for (const b of enemyBullets) {
    ctx.shadowColor = 'rgba(255, 50, 0, 0.8)';
    ctx.shadowBlur = 12;
    const grad = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, 6);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#ff6600');
    grad.addColorStop(1, 'rgba(255, 50, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  
  // Player bullets
  for (const b of bullets) {
    ctx.shadowColor = 'rgba(0, 200, 255, 0.9)';
    ctx.shadowBlur = 14;
    const grad = ctx.createRadialGradient(b.x, b.y, 1, b.x, b.y, 5);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#00ccff');
    grad.addColorStop(1, 'rgba(0, 150, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  
  // Enemies
  for (const e of enemies) {
    drawEnemy(e);
  }
  
  // Player
  if (!gameOver) {
    // Invulnerability blink
    if (player.invuln > 0 && Math.floor(player.invuln / 3) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    drawPlayer();
    ctx.globalAlpha = 1;
    
    // Crosshair
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 15, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(mouseX - 20, mouseY);
    ctx.lineTo(mouseX + 20, mouseY);
    ctx.moveTo(mouseX, mouseY - 20);
    ctx.lineTo(mouseX, mouseY + 20);
    ctx.stroke();
  }
  
  ctx.restore();
  
  // UI
  document.getElementById('score').textContent = score;
  document.getElementById('health').textContent = Math.max(0, player.hp);
  document.getElementById('wave').textContent = wave;
}

// --- Game Loop ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// --- End Game ---
function endGame() {
  gameOver = true;
  spawnParticles(player.x, player.y, 60, '#ff4400', 6, 50);
  spawnParticles(player.x, player.y, 30, '#ffaa00', 5, 40);
  spawnParticles(player.x, player.y, 20, '#ffffff', 4, 30);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').style.display = 'block';
}

// --- Reset ---
function resetGame() {
  player.x = W/2; player.y = H/2;
  player.hp = player.maxHp;
  player.invuln = 0;
  score = 0; wave = 1;
  gameOver = false;
  enemies = [];
  bullets = [];
  enemyBullets = [];
  particles = [];
  trails = [];
  shake = 0;
  frame = 0;
  document.getElementById('gameOver').style.display = 'none';
}

// --- Input ---
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

document.getElementById('restart').addEventListener('click', resetGame);

// --- Handle resize during game ---
window.addEventListener('resize', () => {
  resize();
  if (!gameOver) {
    player.x = Math.max(30, Math.min(W - 30, player.x));
    player.y = Math.max(30, Math.min(H - 30, player.y));
  }
});

// Start
resetGame();
loop();
</script>
</body>
</html>
